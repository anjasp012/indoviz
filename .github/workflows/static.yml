name: Deploy geoviz to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
            node-version: 20

      - name: Create deployment directory
        run: mkdir -p dist

      - name: Copy landing page and assets
        run: cp -r site/* dist/

      - name: Copy utility tools
        run: cp -r util dist/

      - name: Build Viz app
        working-directory: viz
        run: |
          npm install
          npm run build -- --outDir ../dist/viz --emptyOutDir

      - name: Generate dataset list
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const dataPath = "viz/public/data";
            const entries = fs.readdirSync(dataPath, { withFileTypes: true });
            const manifest = [];
            for (const entry of entries) {
              if (entry.isDirectory()) {
                const subPath = path.join(dataPath, entry.name);
                const subFiles = fs.readdirSync(subPath);
                const parquets = subFiles.filter(f => f.toLowerCase().endsWith(".parquet") || f.toLowerCase().endsWith(".geoparquet"));
                if (parquets.length > 0) {
                  manifest.push({ type: "folder", name: entry.name, files: parquets.map(f => `${entry.name}/${f}`) });
                }
              } else if (entry.isFile()) {
                if (entry.name.toLowerCase().endsWith(".parquet") || entry.name.toLowerCase().endsWith(".geoparquet")) {
                  manifest.push({ type: "file", name: entry.name, path: entry.name });
                }
              }
            }
            fs.mkdirSync("dist/viz/data", { recursive: true });
            fs.writeFileSync("dist/viz/data/datasets.json", JSON.stringify(manifest, null, 2));
          '
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
